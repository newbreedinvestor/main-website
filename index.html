<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>New Breed Investors | Real Estate Investing Education</title>
<meta name="description" content="New Breed Investors helps active real estate wholesalers scale to 3-5 deals/month using proven systems, AI tools, and real operator coaching.">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --orange: #f46530;
  --red: #e93d3d;
  --purple: #6b21a8;
  --dark: #0f0f1a;
  --dark-card: #1a1a2e;
  --text-white: #f5f5f5;
  --text-muted: rgba(255,255,255,0.6);
  --gradient-main: linear-gradient(135deg, #f46530, #e93d3d, #6b21a8);
}

html { scroll-behavior: smooth; }

body {
  font-family: 'Inter', sans-serif;
  background: var(--dark);
  color: var(--text-white);
  line-height: 1.6;
  overflow-x: hidden;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 40px 24px;
}

h1, h2, h3 { font-family: 'Outfit', sans-serif; }

.logo {
  font-family: 'Outfit', sans-serif;
  font-size: 1rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.5);
  margin-bottom: 48px;
}

h1 {
  font-size: clamp(2.2rem, 5vw, 3.8rem);
  font-weight: 800;
  line-height: 1.15;
  margin-bottom: 24px;
}

.gradient-text {
  background: var(--gradient-main);
  background-size: 200% auto;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

p.sub {
  font-size: clamp(1rem, 2vw, 1.2rem);
  color: var(--text-muted);
  max-width: 560px;
  margin: 0 auto 48px;
  line-height: 1.75;
}

.cta-group {
  display: flex;
  flex-direction: column;
  gap: 16px;
  align-items: center;
}

@media (min-width: 480px) {
  .cta-group { flex-direction: row; justify-content: center; }
}

.btn-primary {
  display: inline-block;
  padding: 16px 32px;
  border-radius: 50px;
  font-family: 'Outfit', sans-serif;
  font-weight: 700;
  font-size: 1rem;
  text-decoration: none;
  background: var(--gradient-main);
  color: #fff;
  transition: opacity 0.2s, transform 0.2s;
}
.btn-primary:hover { opacity: 0.88; transform: translateY(-2px); }

.btn-secondary {
  display: inline-block;
  padding: 16px 32px;
  border-radius: 50px;
  font-family: 'Outfit', sans-serif;
  font-weight: 700;
  font-size: 1rem;
  text-decoration: none;
  border: 2px solid rgba(255,255,255,0.2);
  color: var(--text-white);
  transition: border-color 0.2s, transform 0.2s;
}
.btn-secondary:hover { border-color: rgba(255,255,255,0.5); transform: translateY(-2px); }

.btn-label {
  font-size: 0.75rem;
  color: rgba(255,255,255,0.35);
  margin-top: 6px;
}

.orb {
  position: fixed;
  border-radius: 50%;
  filter: blur(120px);
  pointer-events: none;
  z-index: 0;
}
.orb-1 { width: 500px; height: 500px; background: rgba(244,101,48,0.15); top: -100px; right: -100px; }
.orb-2 { width: 400px; height: 400px; background: rgba(107,33,168,0.12); bottom: -100px; left: -100px; }

.content { position: relative; z-index: 1; }

footer {
  position: fixed;
  bottom: 24px;
  font-size: 0.75rem;
  color: rgba(255,255,255,0.25);
}
</style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="content">
    <div class="logo">New Breed Investors</div>
    <h1>Built for Investors Who<br><span class="gradient-text">Are Done Playing Small</span></h1>
    <p class="sub">Real systems. Real operators. Real results. Pick where you want to start.</p>

    <div class="cta-group">
      <div>
        <a href="/start" class="btn-primary">Book a Free Scale Session</a>
        <p class="btn-label">30-min strategy call — no pitch</p>
      </div>
      <div>
        <a href="/ws-webinar" class="btn-secondary">Join the Free Training</a>
        <p class="btn-label">Live weekly — no replay</p>
      </div>
    </div>
  </div>

  <footer>&copy; 2026 New Breed Investors</footer>
</body>
</html>
